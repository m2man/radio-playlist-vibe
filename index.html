<!DOCTYPE html>
<html>
<head>
  <title>Vimeo Radio</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 320px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      text-align: center;
    }

    #title {
      margin: 10px 0;
      font-size: 14px;
    }

    .progress-container {
      height: 5px;
      background: rgba(255,255,255,0.2);
      margin: 10px 0;
      cursor: pointer;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: white;
    }

    .time {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    button {
      margin: 10px;
      padding: 10px;
    }

    #player {
      width: 0;
      height: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<div class="card">
  <div id="title">Ready</div>

  <div class="progress-container" id="progressContainer">
    <div class="progress" id="progress"></div>
  </div>

  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <div id="player"></div>

  <div>
    <button onclick="prev()">Back</button>
    <button onclick="playPause()">Play/Pause</button>
    <button onclick="next()">Next</button>
  </div>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>
<script src="script.js"></script>

</body>
</html>
