<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>YouTube Radio</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  font-family: system-ui, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 320px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  text-align: center;
}

input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
  outline: none;
}

.status {
  font-size: 12px;
  opacity: 0.7;
}

#title {
  font-size: 13px;
  margin: 10px 0;
  opacity: 0.85;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* progress */
.progress-container {
  height: 5px;
  background: rgba(255,255,255,0.2);
  margin: 10px 0;
  cursor: pointer;
}

.progress {
  height: 100%;
  width: 0%;
  background: #e2e8f0;
}

.time {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  opacity: 0.7;
}

button {
  margin: 8px;
  padding: 10px;
  font-size: 16px;
  border-radius: 50%;
  border: 1px solid #e2e8f0;
  background: none;
  color: #e2e8f0;
  cursor: pointer;
}

button:hover {
  background: rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="card">

  <div class="status" id="status">Ready</div>

  <div id="title">—</div>

  <input id="playlistInput" placeholder="Paste playlist URL or ID">

  <button onclick="loadPlaylist()">Load</button>

  <div class="progress-container" id="progressContainer">
    <div class="progress" id="progress"></div>
  </div>

  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <div id="player"></div>

  <div>
    <button onclick="prev()">⏮</button>
    <button onclick="playPause()">⏯</button>
    <button onclick="next()">⏭</button>
  </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>

</body>
</html>
